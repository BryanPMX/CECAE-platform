# CECAE Production Stack - Portainer / Self-hosted
# Pre-built API image. PostgreSQL is private; only the API joins Nginx Proxy Manager.

services:
  api:
    image: ${CECAE_API_IMAGE:-brpmx/cecae-api:latest}
    container_name: cecae-api-1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - APP_ENV=production
      - APP_NAME=cecae-api
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-info}
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - HTTP_READ_TIMEOUT=${HTTP_READ_TIMEOUT:-5s}
      - HTTP_WRITE_TIMEOUT=${HTTP_WRITE_TIMEOUT:-10s}
      - HTTP_IDLE_TIMEOUT=${HTTP_IDLE_TIMEOUT:-60s}
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT:-10s}
      - DATABASE_URL=postgres://${POSTGRES_USER:-cecae}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cecae}?sslmode=disable
      - DATABASE_MIN_CONNS=${DATABASE_MIN_CONNS:-1}
      - DATABASE_MAX_CONNS=${DATABASE_MAX_CONNS:-10}
      - DATABASE_MAX_CONN_LIFETIME=${DATABASE_MAX_CONN_LIFETIME:-1h}
      - DATABASE_MIGRATIONS_PATH=file:///app/migrations
      - AUTH_ACCESS_TOKEN_SECRET=${AUTH_ACCESS_TOKEN_SECRET}
      - AUTH_REFRESH_TOKEN_SECRET=${AUTH_REFRESH_TOKEN_SECRET}
      - AUTH_ACCESS_TOKEN_TTL=${AUTH_ACCESS_TOKEN_TTL:-15m}
      - AUTH_REFRESH_TOKEN_TTL=${AUTH_REFRESH_TOKEN_TTL:-720h}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-true}
      - TZ=UTC
    networks:
      - cecae_backend
      - nginx-proxy-manager_default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--method=GET", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  migrate:
    image: ${CECAE_API_IMAGE:-brpmx/cecae-api:latest}
    container_name: cecae-migrate-1
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/migrate"]
    environment:
      - APP_ENV=production
      - APP_NAME=cecae-api
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-info}
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-cecae}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cecae}?sslmode=disable
      - DATABASE_MIN_CONNS=${DATABASE_MIN_CONNS:-1}
      - DATABASE_MAX_CONNS=${DATABASE_MAX_CONNS:-10}
      - DATABASE_MAX_CONN_LIFETIME=${DATABASE_MAX_CONN_LIFETIME:-1h}
      - DATABASE_MIGRATIONS_PATH=file:///app/migrations
      - AUTH_ACCESS_TOKEN_SECRET=${AUTH_ACCESS_TOKEN_SECRET}
      - AUTH_REFRESH_TOKEN_SECRET=${AUTH_REFRESH_TOKEN_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-true}
      - TZ=UTC
    networks:
      - cecae_backend

  admin-bootstrap:
    image: ${CECAE_API_IMAGE:-brpmx/cecae-api:latest}
    container_name: cecae-admin-bootstrap-1
    restart: "no"
    profiles:
      - bootstrap
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["/app/admin"]
    environment:
      - APP_ENV=production
      - APP_NAME=cecae-api
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-info}
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-cecae}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cecae}?sslmode=disable
      - DATABASE_MIN_CONNS=${DATABASE_MIN_CONNS:-1}
      - DATABASE_MAX_CONNS=${DATABASE_MAX_CONNS:-10}
      - DATABASE_MAX_CONN_LIFETIME=${DATABASE_MAX_CONN_LIFETIME:-1h}
      - DATABASE_MIGRATIONS_PATH=file:///app/migrations
      - AUTH_ACCESS_TOKEN_SECRET=${AUTH_ACCESS_TOKEN_SECRET}
      - AUTH_REFRESH_TOKEN_SECRET=${AUTH_REFRESH_TOKEN_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-true}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - TZ=UTC
    networks:
      - cecae_backend

  db:
    image: postgres:16-alpine
    container_name: cecae-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cecae}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cecae}
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - cecae_postgres_data:/var/lib/postgresql/data
    networks:
      - cecae_backend

networks:
  cecae_backend:
    driver: bridge
  nginx-proxy-manager_default:
    external: true

volumes:
  cecae_postgres_data:
    driver: local
